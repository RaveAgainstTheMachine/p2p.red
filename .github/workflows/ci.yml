name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Frontend
        run: pnpm run lint

      - name: Type-check Frontend
        run: pnpm run type-check

      - name: Run Frontend Unit Tests
        run: pnpm run test:unit

      - name: Install Metadata API Dependencies
        working-directory: ./metadata-api
        run: pnpm install --frozen-lockfile

      - name: Run Metadata API Tests
        working-directory: ./metadata-api
        run: pnpm test

  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: p2p-app:latest

      - name: Build Metadata API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.metadata-server
          push: false
          tags: p2p-metadata-api:latest

      - name: Build PeerJS Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.peerjs
          push: false
          tags: p2p-peerjs:latest

      - name: Build Envoy Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.envoy
          push: false
          tags: p2p-envoy:latest

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E Tests
        run: pnpm run test:e2e
        env:
          NODE_ENV: test
