name: Public Release Sync

on:
  push:
    branches:
      - master

jobs:
  sync-to-public:
    runs-on: ubuntu-latest
    if: github.repository == 'StevenFrost/p2p-file-share' # Only run on main repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }} # Needs a PAT with push access

      - name: Configure Git
        run: |
          git config --global user.name 'P2P Sync Bot'
          git config --global user.email 'bot@p2p.red'

      - name: Run Sanitized Sync
        run: ./automation/public-sync.sh

      - name: Push to Public
        run: |
          git push origin public
