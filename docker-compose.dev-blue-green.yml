version: '3.8'

services:
  # Blue environment (current)
  app-blue:
    build: 
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: p2p-app-blue
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      - NODE_ENV=production
      - PEERJS_HOST=dev-signal.p2p.red
      - PEERJS_PORT=443
      - PEERJS_PATH=/peerjs
      - VITE_HOST=0.0.0.0
      - HOST_CHECK_DISABLED=true
    networks:
      - p2p-network
    labels:
      - "version=blue"
      - "environment=development"

  # Green environment (new deployment)
  app-green:
    build: 
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: p2p-app-green
    restart: unless-stopped
    ports:
      - "5174:3000"
    environment:
      - NODE_ENV=production
      - PEERJS_HOST=dev-signal.p2p.red
      - PEERJS_PORT=443
      - PEERJS_PATH=/peerjs
      - VITE_HOST=0.0.0.0
      - HOST_CHECK_DISABLED=true
    networks:
      - p2p-network
    labels:
      - "version=green"
      - "environment=development"

networks:
  p2p-network:
    driver: bridge
