services:
  postgres:
    image: postgres:16-alpine
    container_name: local-p2p-postgres
    restart: unless-stopped
    env_file:
      - ./local-secrets/metadata.env
    environment:
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p_api_user -d p2p_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-p2p
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - ./local-secrets:/run/secrets:ro
      - ./metadata-api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: local-p2p-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - local_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - local-p2p

  metadata-api:
    image: ${METADATA_API_IMAGE:-p2p-metadata-api:latest}
    container_name: local-p2p-metadata-api
    restart: unless-stopped
    env_file:
      - ./local-secrets/metadata.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      METADATA_ENV_FILE: /run/secrets/metadata.env
      WEB_STATUS_URL: https://${LOCAL_P2P_HOST:-<ip>}:8443
      SIGNAL_STATUS_URL: http://local-p2p-peerjs:9000/peerjs/id
      ANALYTICS_STATUS_URL: http://local-p2p-plausible:8000/js/script.js
      OPENBAO_STATUS_URL: https://<bao-domain>:8200/v1/sys/health
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
      POSTGRES_MAX_CONNECTIONS: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      LINK_EXPIRY_HOURS: 24
      CLEANUP_INTERVAL_MINUTES: 60
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: https://${LOCAL_P2P_HOST:-<ip>}:8443,https://dash.<domain>
      ADMIN_JWT_SECRET: local-dev-admin-secret
    ports:
      - "${LOCAL_METADATA_PUBLISH:-<ip>:3001}:3001"
    networks:
      - local-p2p
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./local-secrets:/run/secrets:ro
    extra_hosts:
      - "<bao-domain>:<ip>"

  anubis:
    image: ghcr.io/techarohq/anubis:latest
    container_name: local-p2p-anubis
    restart: unless-stopped
    depends_on:
      - metadata-api
    environment:
      BIND: ":8923"
      TARGET: "http://local-p2p-metadata-api:3001"
      DIFFICULTY: "4"
      SERVE_ROBOTS_TXT: "true"
    networks:
      - local-p2p

  plausible-db:
    image: postgres:16-alpine
    container_name: local-p2p-plausible-db
    restart: unless-stopped
    env_file:
      - ./local-secrets/plausible.env
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
    volumes:
      - local_plausible_db_data:/var/lib/postgresql/data
    networks:
      - local-p2p

  plausible-events-db:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: local-p2p-plausible-events-db
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - local_plausible_events_data:/var/lib/clickhouse
    networks:
      - local-p2p

  plausible:
    image: plausible/analytics:latest
    container_name: local-p2p-plausible
    restart: unless-stopped
    depends_on:
      - plausible-db
      - plausible-events-db
    env_file:
      - ./local-secrets/plausible.env
    environment:
      BASE_URL: https://${LOCAL_P2P_HOST:-<ip>}:8443
      CLICKHOUSE_DATABASE_URL: http://local-p2p-plausible-events-db:8123/plausible_events
      DISABLE_AUTH_FOR_PRODUCTION: "false"
    networks:
      - local-p2p

  peerjs-server:
    image: ${PEERJS_IMAGE:-p2p-peerjs:latest}
    container_name: local-p2p-peerjs
    restart: unless-stopped
    environment:
      - PEERJS_PORT=9000
      - PEERJS_HOST=${LOCAL_P2P_HOST:-<ip>}
    networks:
      - local-p2p

  app-blue:
    image: ${APP_IMAGE_BLUE:-p2p-app-blue:local}
    container_name: local-p2p-app-blue
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PEERJS_HOST=${LOCAL_P2P_HOST:-<ip>}
      - PEERJS_PORT=8443
      - PEERJS_PATH=/peerjs
      - VITE_HOST=<ip>
      - HOST_CHECK_DISABLED=true
      - VITE_BUILD_VARIANT=blue
      - VITE_ADMIN_API_URL=https://${LOCAL_P2P_HOST:-<ip>}:8443
    networks:
      - local-p2p
    labels:
      - "version=blue"

  app-green:
    image: ${APP_IMAGE_GREEN:-p2p-app-green:local}
    container_name: local-p2p-app-green
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PEERJS_HOST=${LOCAL_P2P_HOST:-<ip>}
      - PEERJS_PORT=8443
      - PEERJS_PATH=/peerjs
      - VITE_HOST=<ip>
      - HOST_CHECK_DISABLED=true
      - VITE_BUILD_VARIANT=green
      - VITE_ADMIN_API_URL=https://${LOCAL_P2P_HOST:-<ip>}:8443
    networks:
      - local-p2p
    labels:
      - "version=green"

  envoy:
    image: envoyproxy/envoy:v1.30.1
    container_name: local-p2p-envoy
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${LOCAL_HTTP_PORT:-8080}:8080"
      - "${LOCAL_HTTPS_PORT:-8443}:8443"
      - "<ip>:${LOCAL_ENVOY_ADMIN_PORT:-9901}:9901"
    volumes:
      - ./envoy.local.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy-runtime:/etc/envoy/runtime:ro
      - ./local-certs:/etc/envoy/certs:ro
    depends_on:
      - app-blue
      - app-green
      - peerjs-server
      - metadata-api
      - anubis
      - plausible
    networks:
      - local-p2p

volumes:
  local_postgres_data:
    driver: local
  local_redis_data:
    driver: local
  local_plausible_db_data:
    driver: local
  local_plausible_events_data:
    driver: local

networks:
  local-p2p:
    driver: bridge
