version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: p2p-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p_api_user -d p2p_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2p-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - p2p-network

  # Metadata API Server
  metadata-api:
    image: ${METADATA_API_IMAGE:-p2p-metadata-api:latest}
    container_name: p2p-metadata-api
    restart: unless-stopped
    env_file:
      - ${METADATA_API_ENV_FILE:-/run/secrets/metadata.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_MAX_CONNECTIONS: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      LINK_EXPIRY_HOURS: 24
      CLEANUP_INTERVAL_MINUTES: 60
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: ${CORS_ORIGIN:-https://p2p.red}
    ports:
      - "0.0.0.0:3001:3001"
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  p2p-network:
    driver: bridge
