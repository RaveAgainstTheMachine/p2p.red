version: '3.8'

services:
  # PostgreSQL - Metadata storage
  postgres:
    image: postgres:16-alpine
    container_name: p2p-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-P2P_Secure_Pass_2024!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p_api_user -d p2p_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2p-network

  # Redis - Metadata cache
  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - p2p-network

  # Metadata API - Short link generation
  metadata-api:
    build:
      context: ./metadata-api
      dockerfile: Dockerfile
    container_name: p2p-metadata-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-P2P_Secure_Pass_2024!}
      POSTGRES_MAX_CONNECTIONS: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      LINK_EXPIRY_HOURS: 24
      CLEANUP_INTERVAL_MINUTES: 60
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: https://p2p.red
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend app (React)
  app:
    build: .
    container_name: p2p-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PEERJS_HOST=p2p.red
      - PEERJS_PORT=443
      - PEERJS_PATH=/peerjs
      - VITE_HOST=0.0.0.0
      - HOST_CHECK_DISABLED=true
    depends_on:
      - peerjs-server
      - metadata-api
    networks:
      - p2p-network

  # PeerJS signaling server
  peerjs-server:
    build:
      context: .
      dockerfile: Dockerfile.peerjs
    container_name: p2p-peerjs
    restart: unless-stopped
    environment:
      - PEERJS_PORT=9000
      - PEERJS_HOST=p2p.red
    networks:
      - p2p-network

  # TURN server (NAT traversal)
  turnserver:
    image: coturn/coturn:latest
    container_name: p2p-turn
    restart: unless-stopped
    network_mode: "host"
    command:
      - "-n"
      - "--log-file=stdout"
      - "--listening-port=3478"
      - "--listening-ip=0.0.0.0"
      - "--relay-ip=149.56.131.26"
      - "--external-ip=149.56.131.26"
      - "--realm=p2p.red"
      - "--lt-cred-mech"
      - "--user=p2puser:p2ppass123"
      - "--no-tls"
      - "--no-dtls"
      - "--fingerprint"
      - "--min-port=49152"
      - "--max-port=65535"
      - "-v"

  # Nginx reverse proxy
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: p2p-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - peerjs-server
      - metadata-api
    networks:
      - p2p-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  p2p-network:
    driver: bridge
