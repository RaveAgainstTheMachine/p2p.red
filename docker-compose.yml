version: '3.8'

services:
  # PostgreSQL - Metadata storage
  postgres:
    image: postgres:16-alpine
    container_name: p2p-postgres
    restart: unless-stopped
    env_file:
      - /run/secrets/metadata.env
    environment:
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p_api_user -d p2p_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - p2p-network

  # Redis - Metadata cache
  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - p2p-network

  # Metadata API - Short link generation
  metadata-api:
    image: ${METADATA_API_IMAGE:-p2p-metadata-api:latest}
    container_name: p2p-metadata-api
    restart: unless-stopped
    env_file:
      - ${METADATA_API_ENV_FILE:-./metadata-api/.env}
      - /run/secrets/metadata.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      METADATA_ENV_FILE: /run/secrets/metadata.env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: p2p_metadata
      POSTGRES_USER: p2p_api_user
      POSTGRES_MAX_CONNECTIONS: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      LINK_EXPIRY_HOURS: 24
      CLEANUP_INTERVAL_MINUTES: 60
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CORS_ORIGIN: https://p2p.red
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - /run/secrets:/run/secrets:ro

  # Frontend app (React)
  app:
    image: ${APP_IMAGE:-p2p-app:latest}
    container_name: p2p-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PEERJS_HOST=p2p.red
      - PEERJS_PORT=443
      - PEERJS_PATH=/peerjs
      - VITE_HOST=0.0.0.0
      - HOST_CHECK_DISABLED=true
    depends_on:
      - peerjs-server
      - metadata-api
    networks:
      - p2p-network

  # PeerJS signaling server
  peerjs-server:
    image: ${PEERJS_IMAGE:-p2p-peerjs:latest}
    container_name: p2p-peerjs
    restart: unless-stopped
    environment:
      - PEERJS_PORT=9000
      - PEERJS_HOST=p2p.red
    networks:
      - p2p-network

  # Nginx reverse proxy
  nginx:
    image: ${NGINX_IMAGE:-p2p-nginx:latest}
    container_name: p2p-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - peerjs-server
      - metadata-api
    networks:
      - p2p-network
      - p2p-bluegreen-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  p2p-network:
    driver: bridge
  p2p-bluegreen-network:
    external: true
    name: p2p-bluegreen_p2p-network
