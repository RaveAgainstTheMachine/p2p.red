<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="%VITE_SITE_CANONICAL_URL%/" />
    <title>%VITE_SITE_NAME% - Secure Peer-to-Peer File Sharing</title>

    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_CANONICAL_URL%/" />
    <meta property="og:title" content="%VITE_SITE_NAME% - Secure File Sharing" />

    <meta property="og:site_name" content="%VITE_SITE_NAME%" />
    
    <!-- Twitter -->

    <meta property="twitter:url" content="%VITE_SITE_CANONICAL_URL%/" />

    <meta property="twitter:description" content="Send files fast with direct WebRTC peer-to-peer transfers and end-to-end AES-GCM encryption. No server file storage." />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "%VITE_SITE_NAME%",
        "url": "%VITE_SITE_CANONICAL_URL%/",
        "description": "Secure peer-to-peer file sharing with end-to-end encryption."
      }
    </script>
    <script defer data-domain="%VITE_SITE_DOMAIN%" src="/js/script.js"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
