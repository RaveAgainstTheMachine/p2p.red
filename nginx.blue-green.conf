events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Dynamic upstream configuration
    upstream app {
        server p2p-app-blue:3000;  # Default to blue
    }

    upstream peerjs {
        server p2p-peerjs:9000;
    }

    upstream metadata_api {
        server p2p-metadata-api:3001;
    }

    # Health check endpoint for load balancer
    server {
        listen 8080;
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 80;
        server_name p2p.red www.p2p.red;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name p2p.red www.p2p.red;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/p2p.red/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/p2p.red/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;

        # Rate limiting zone
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://p2p.red; font-src 'self'; object-src 'none';" always;

        # Share preview route
        location /share/ {
            rewrite ^/share/(.*)$ /api/metadata/$1?html=true break;
            proxy_pass http://p2p-metadata-api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Metadata API
        location /api/ {
            proxy_pass http://p2p-metadata-api:3001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api_limit burst=20 nodelay;
        }

        # PeerJS signaling
        location /peerjs/ {
            proxy_pass http://p2p-peerjs:9000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Main application
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache busting headers
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static assets
        location /assets/ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
            etag on;
        }
    }
}
