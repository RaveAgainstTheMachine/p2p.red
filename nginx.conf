events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/p2p.red/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2p.red/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    upstream app {
        server p2p-app-green:3000;
    }

    server {
        listen 443 ssl http2;
        server_name plausible.p2p.red;

        ssl_certificate /etc/letsencrypt/live/plausible.p2p.red/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/plausible.p2p.red/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;

        location / {
            proxy_pass http://plausible;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    upstream peerjs {
        server p2p-peerjs:9000;
    }

    upstream metadata_api {
        server p2p-metadata-api:3001;
    }

    upstream plausible {
        server p2p-plausible:8000;
    }

    server {
        listen 80;
        server_name p2p.red www.p2p.red;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name signal.p2p.red;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name plausible.p2p.red;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name p2p.red www.p2p.red;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://p2p.red; font-src 'self'; object-src 'none';" always;

        # Share preview route (for social media crawlers)
        location /share/ {
            rewrite ^/share/(.*)$ /api/metadata/$1?html=true break;
            proxy_pass http://p2p-metadata-api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Metadata API (specific route first)
        location /api/ {
            proxy_pass http://p2p-metadata-api:3001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Plausible analytics (first-party proxy)
        location = /js/script.js {
            proxy_pass http://plausible/js/script.js;
            proxy_set_header Host plausible.p2p.red;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_except GET { deny all; }
        }

        location = /api/event {
            proxy_pass http://plausible/api/event;
            proxy_set_header Host plausible.p2p.red;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 16k;
            limit_except POST { deny all; }
        }

        # PeerJS signaling (specific route before catch-all)
        location /peerjs/ {
            proxy_pass http://p2p-peerjs:9000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve static files directly from container
        root /usr/share/nginx/html;
        index index.html;

        # Main application (catch-all, must be last)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static assets - aggressive no-cache for JS/CSS to ensure latest code
        location /assets/ {
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
            etag on;
        }
    }

    server {
        listen 443 ssl http2;
        server_name signal.p2p.red;

        ssl_certificate /etc/letsencrypt/live/signal.p2p.red/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/signal.p2p.red/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;

        location /peerjs/ {
            proxy_pass http://p2p-peerjs:9000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 404;
        }
    }
}
