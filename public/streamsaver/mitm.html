<!--
  mitm.html is the lite "man in the middle"
  This is only meant to signal the opener's messageChannel to
  the service worker. Keeping it alive helps the SW stay active.
-->
<script>
let keepAlive = () => {
  keepAlive = () => {};
  const ping = location.href.substr(0, location.href.lastIndexOf('/')) + '/ping';
  const interval = setInterval(() => {
    if (sw) {
      sw.postMessage('ping');
    } else {
      fetch(ping).then(res => res.text(!res.ok && clearInterval(interval)));
    }
  }, 10000);
};

let messages = [];
window.onmessage = evt => messages.push(evt);

let sw = null;
let scope = '';

function registerWorker() {
  return navigator.serviceWorker.getRegistration('./').then(swReg => {
    return swReg || navigator.serviceWorker.register('sw.js', { scope: './' });
  }).then(swReg => {
    const swRegTmp = swReg.installing || swReg.waiting;

    scope = swReg.scope;

    return (sw = swReg.active) || new Promise(resolve => {
      swRegTmp.addEventListener('statechange', fn = () => {
        if (swRegTmp.state === 'activated') {
          swRegTmp.removeEventListener('statechange', fn);
          sw = swReg.active;
          resolve();
        }
      });
    });
  });
}

function onMessage(event) {
  const { data, ports, origin } = event;

  if (!ports || !ports.length) {
    throw new TypeError("[StreamSaver] You didn't send a messageChannel");
  }

  if (typeof data !== 'object') {
    throw new TypeError("[StreamSaver] You didn't send a object");
  }

  data.origin = origin;
  data.referrer = data.referrer || document.referrer || origin;

  data.streamSaverVersion = new URLSearchParams(location.search).get('version');

  if (!data.headers) {
    console.warn("[StreamSaver] pass `data.headers` to be forwarded to the service worker");
  } else {
    new Headers(data.headers);
  }

  if (!data.pathname) {
    data.pathname = Math.random().toString().slice(-6) + '/' + data.filename;
  }

  data.pathname = data.pathname.replace(/^\/+/g, '');

  const org = origin.replace(/(^\w+:|^)\/\//, '');
  data.url = new URL(`${scope + org}/${data.pathname}`).toString();

  const port = ports[0];
  port.onmessage = evt => {
    if (evt.data?.debug) {
      try {
        window.parent?.postMessage({ type: 'streamsaver_debug', detail: evt.data.debug }, origin);
      } catch (error) {
        console.warn('[StreamSaver] Unable to notify parent about debug', error);
      }
    }
    if (evt.data.download) {
      try {
        window.parent?.postMessage({ type: 'streamsaver_download', url: evt.data.download }, origin);
      } catch (error) {
        console.warn('[StreamSaver] Unable to notify parent about download', error);
      }
      window.location.href = evt.data.download;
    }
  };

  sw.postMessage(data, [port]);
  keepAlive();
}

registerWorker().then(() => {
  try {
    window.parent?.postMessage({ type: 'streamsaver_debug', detail: 'worker_ready' }, location.origin);
  } catch (error) {
    console.warn('[StreamSaver] Unable to notify parent about worker readiness', error);
  }
  window.onmessage = onMessage;
  messages.forEach(onMessage);
  messages = [];
});
</script>
